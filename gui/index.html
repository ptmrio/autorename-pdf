<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoRename-PDF</title>
  <link rel="icon" type="image/png" href="/32x32.png">
  <link rel="stylesheet" href="./assets/css/output.css">
</head>
<body class="app-shell">

  <!-- Titlebar (fixed, custom chrome) -->
  <div data-tauri-drag-region class="titlebar" id="title-bar">
    <div class="titlebar-left">
      <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <span class="titlebar-title titlebar-brand">AutoRename-PDF</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-minimize" class="titlebar-btn" aria-label="Minimize">
        <svg width="10" height="1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" aria-label="Maximize">
        <svg width="10" height="10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn titlebar-btn-close" aria-label="Close">
        <svg width="10" height="10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
  </div>

  <!-- App content (offset below titlebar) -->
  <div id="app" class="flex flex-col h-full overflow-hidden" style="padding-top: var(--titlebar-height, 32px);">
    <!-- Content rendered by main.ts -->
  </div>

  <div class="toast-container toast-bottom-right"></div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
